<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:20px">
<h2>API Debug Test</h2>
<button onclick="test()" style="padding:10px 20px;font-size:16px;cursor:pointer">TEST API</button>
<pre id="out" style="margin-top:20px;white-space:pre-wrap;word-break:break-all;background:#222;padding:15px;border-radius:8px"></pre>
<script>
async function test() {
  const out = document.getElementById('out');
  out.textContent = 'Chiamata in corso...';
  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 200,
        messages: [{ role: "user", content: "Rispondi solo: OK" }]
      })
    });
    const status = res.status;
    const data = await res.json();
    out.textContent = `HTTP Status: ${status}\n\n${JSON.stringify(data, null, 2)}`;
  } catch(e) {
    out.textContent = 'ERRORE: ' + e.message;
  }
}
</script>
</body>
</html>
